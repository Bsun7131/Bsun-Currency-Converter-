<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bsun Currency Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="container">
    <div class="copyright">
      Copyright © Bisan Subba 2026<br />
      All rights reserved.
    </div>

    <h1>Bsun Currency Converter</h1>
    <p class="developer">Developer: Bisan Subba</p>
    <p class="subtitle">Fast live currency conversion for everyday use.</p>

    <input type="number" id="amount" placeholder="Enter amount" value="1" />

    <div class="selectors">
      <select id="fromCurrency">
        <option value="GBP">GBP 🇬🇧 British Pound</option>
        <option value="USD">USD 🇺🇸 US Dollar</option>
        <option value="EUR">EUR 🇪🇺 Euro</option>
        <option value="NPR">NPR 🇳🇵 Nepalese Rupee</option>
        <option value="INR">INR 🇮🇳 Indian Rupee</option>
        <option value="HKD">HKD 🇭🇰 Hong Kong Dollar</option>
        <option value="BND">BND 🇧🇳 Brunei Dollar</option>
        <option value="SGD">SGD 🇸🇬 Singapore Dollar</option>
      </select>

      <button class="swap" onclick="swapCurrencies()">⇄</button>

      <select id="toCurrency">
        <option value="NPR">NPR 🇳🇵 Nepalese Rupee</option>
        <option value="GBP">GBP 🇬🇧 British Pound</option>
        <option value="USD">USD 🇺🇸 US Dollar</option>
        <option value="EUR">EUR 🇪🇺 Euro</option>
        <option value="INR">INR 🇮🇳 Indian Rupee</option>
        <option value="HKD">HKD 🇭🇰 Hong Kong Dollar</option>
        <option value="BND">BND 🇧🇳 Brunei Dollar</option>
        <option value="SGD">SGD 🇸🇬 Singapore Dollar</option>
      </select>
    </div>

    <button class="convert-btn" onclick="convertCurrency()">Convert</button>

    <section class="result-card">
      <p id="result">Result appears here</p>
      <small id="rateInfo">Live exchange rate will appear here.</small>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
